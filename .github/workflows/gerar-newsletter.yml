name: Gerar Newsletter Posto em Dia

on:
  workflow_dispatch: {}
  schedule:
    # Backup: Sexta 20:30 UTC = 17:30 BRT.
    # Cron primário é o n8n (workflow "Newsletter — Agendador 17:30 sexta")
    # que dispara via workflow_dispatch da GitHub API.
    - cron: "30 20 * * 5"

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node deps
        run: npm install

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Gerar HTML + PDFs
        id: gerar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/gerar-newsletter.mjs

      - name: Commit + push edição
        id: commit
        env:
          EDICAO: ${{ steps.gerar.outputs.edicao }}
          PERIODO: ${{ steps.gerar.outputs.periodo }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add editions/
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar (edição já existe?)"
            echo "new_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            git commit -m "newsletter: edição ${EDICAO} (${PERIODO})"
            git push
            # Captura SHA do commit recém-criado pra URLs raw funcionarem
            NEW_SHA=$(git rev-parse HEAD)
            echo "new_sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"
            echo "✓ Novo commit: ${NEW_SHA}"
          fi

      - name: Avisar n8n
        if: success() && steps.gerar.outputs.edicao != ''
        env:
          N8N_NEWSLETTER_URL: ${{ secrets.N8N_NEWSLETTER_URL }}
          EDICAO: ${{ steps.gerar.outputs.edicao }}
          PERIODO: ${{ steps.gerar.outputs.periodo }}
          MOBILE_PATH: ${{ steps.gerar.outputs.mobile_path }}
          A4_PATH: ${{ steps.gerar.outputs.a4_path }}
        run: |
          if [ -z "$N8N_NEWSLETTER_URL" ]; then
            echo "N8N_NEWSLETTER_URL não configurado — pulando notificação"
            exit 0
          fi
          REPO="${{ github.repository }}"
          # SHA do commit recém-criado (não github.sha — esse é do trigger, ANTES do commit dos PDFs)
          SHA="${{ steps.commit.outputs.new_sha }}"
          MOBILE_URL="https://raw.githubusercontent.com/${REPO}/${SHA}/${MOBILE_PATH}"
          A4_URL="https://raw.githubusercontent.com/${REPO}/${SHA}/${A4_PATH}"
          PAYLOAD=$(cat <<EOF
          {
            "edicao": "${EDICAO}",
            "periodo": "${PERIODO}",
            "mobile_url": "${MOBILE_URL}",
            "a4_url": "${A4_URL}",
            "mobile_filename": "PostoEmDia_Semana${EDICAO}_Mobile.pdf",
            "a4_filename": "PostoEmDia_Semana${EDICAO}_A4.pdf"
          }
          EOF
          )
          echo "Enviando para n8n: $N8N_NEWSLETTER_URL"
          echo "$PAYLOAD"
          # Retry: VPS pode estar momentaneamente inacessível (já caiu em 22/05/2026).
          # Tenta 5x com backoff, timeout total ~10min, falha de conexão = retry.
          curl -fsS -X POST "$N8N_NEWSLETTER_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --connect-timeout 20 \
            --max-time 60 \
            --retry 5 \
            --retry-delay 30 \
            --retry-all-errors
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "::error::Webhook n8n falhou após 5 tentativas (exit $STATUS). PDFs ESTÃO commitados no repo — dispare manualmente: curl -X POST -H 'Content-Type: application/json' -d '$PAYLOAD' '$N8N_NEWSLETTER_URL'"
            exit $STATUS
          fi
          echo "✓ Webhook n8n entregue."
